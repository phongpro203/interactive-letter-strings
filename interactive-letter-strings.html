<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Letter Strings</title>
    <style>
      :root {
        color-scheme: light;
        background: #f2f2ef;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #f2f2ef;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="letter-strings" aria-hidden="true"></canvas>
    <div id="accessible-text" class="sr-only"></div>

    <script>
      // Edit these columns to change the text shown on the canvas.
      const TEXT_COLUMNS = [
        "render関数は描画のたびに次のフレームを予約し粒子を更新する",
        "位置には座標を持たせ速度に摩擦をかけてから次の場所へ進める",
        "ベルレー積分は一つ前のフレームで文字がいた場所を覚えている",
        "すべての制約を順番にたどり文字同士の距離を少しずつ整える",
        "それぞれの文字は柔らかな布から垂れる糸のように次の文字を追う",
        "ポインタの動きがつながった文字のあいだに静かな波を送り込む",
        "粒子は座標と文字を受け取り現在と過去の位置を記憶して動く",
        "距離の制約は列をつなぎ止めながらしなやかに曲がる余地を残す",
        "古い位置との差が速度となるため速度を別の状態として持たなくてよい",
        "半径の内側では近いほど力が強まり文字をポインタから遠ざける",
        "ポインタが離れると文字はゆっくり落ち着き元の場所へ戻っていく",
        "キャンバスはそれぞれの粒子が今いる座標に一文字ずつ描いていく",
        "上端の固定点が糸を支え重力が自由な末端を静かに下へ引っ張る",
        "次のフレームを待ち画面を消し更新し制約を解きまた描画を繰り返す",
        "触れて曲げて指を離すと文字の糸は元の垂直な形を思い出して戻る",
        "隣り合う文字がずれを分け合うことで柔らかな動きが下へ伝わっていく",
      ];

      const CONFIG = {
        damping: 0.94,
        gravity: 0.12,
        constraintIterations: 6,
        pointerRadius: 72,
        pointerForce: 8,
        pointerIdleMs: 90,
        resizeDebounceMs: 180,
        background: "#f2f2ef",
        foreground: "#242424",
      };

      const canvas = document.getElementById("letter-strings");
      const context = canvas.getContext("2d");
      const accessibleText = document.getElementById("accessible-text");
      const reducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;

      let viewportWidth = 0;
      let viewportHeight = 0;
      let fontSize = 32;
      let displayColumns = [];
      let letters = [];
      let constraints = [];
      let pointerIdleTimer;
      let resizeTimer;

      const pointer = {
        x: 0,
        y: 0,
        active: false,
        type: "mouse",
      };

      accessibleText.textContent = TEXT_COLUMNS.join(". ");

      function calculateLayout() {
        const horizontalMargin = Math.max(12, viewportWidth * 0.035);
        const verticalMargin = Math.max(16, viewportHeight * 0.04);
        fontSize = Math.max(4.5, Math.min(9, viewportWidth / 175));
        const characterSpacing = fontSize * 0.94;
        const maxCharacters = Math.max(
          1,
          Math.floor((viewportHeight - verticalMargin * 2) / characterSpacing),
        );
          const targetColumnSpacing = Math.max(16, fontSize * 2.15);
        const columnCount = Math.max(
          1,
          Math.floor(
            (viewportWidth - horizontalMargin * 2) / targetColumnSpacing,
          ) + 1,
        );
        const columnSpacing =
          (viewportWidth - horizontalMargin * 2) / Math.max(columnCount - 1, 1);

        displayColumns = Array.from({ length: columnCount }, (_, index) => {
          const source = TEXT_COLUMNS[index % TEXT_COLUMNS.length];
          const offset = (index * 13) % source.length;
          const repeated = `${source.slice(offset)} ${source.slice(0, offset)} `;
          return repeated
            .repeat(Math.ceil(maxCharacters / repeated.length))
            .slice(0, maxCharacters);
        });

        return {
          horizontalMargin,
          verticalMargin,
          characterSpacing,
          columnSpacing,
        };
      }

      function buildLetterStrings() {
        const {
          horizontalMargin,
          verticalMargin,
          characterSpacing,
          columnSpacing,
        } = calculateLayout();
        letters = [];
        constraints = [];

        displayColumns.forEach((column, columnIndex) => {
          const startX = horizontalMargin + columnIndex * columnSpacing;
          const startY = verticalMargin;
          let previousLetter = null;

          Array.from(column).forEach((character, characterIndex) => {
            const anchorX = startX;
            const anchorY = startY + characterIndex * characterSpacing;
            const letter = {
              character,
              x: anchorX,
              y: anchorY,
              previousX: anchorX,
              previousY: anchorY,
              anchorX,
              anchorY,
              pinned: characterIndex === 0,
            };

            letters.push(letter);

            if (previousLetter) {
              constraints.push({
                first: previousLetter,
                second: letter,
                restLength: characterSpacing,
              });
            }

            previousLetter = letter;
          });
        });
      }

      function resizeCanvas() {
        viewportWidth = window.innerWidth;
        viewportHeight = window.innerHeight;
        const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);

        canvas.width = Math.round(viewportWidth * pixelRatio);
        canvas.height = Math.round(viewportHeight * pixelRatio);
        context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
        buildLetterStrings();
        render();
      }

      function integrate(letter) {
        if (letter.pinned) {
          letter.x = letter.anchorX;
          letter.y = letter.anchorY;
          letter.previousX = letter.anchorX;
          letter.previousY = letter.anchorY;
          return;
        }

        const velocityX = (letter.x - letter.previousX) * CONFIG.damping;
        const velocityY = (letter.y - letter.previousY) * CONFIG.damping;

        letter.previousX = letter.x;
        letter.previousY = letter.y;
        letter.x += velocityX;
        letter.y += velocityY + CONFIG.gravity;
      }

      function applyPointerForce(letter) {
        if (!pointer.active || letter.pinned) return;

        const deltaX = letter.x - pointer.x;
        const deltaY = letter.y - pointer.y;
        const rawDistance = Math.hypot(deltaX, deltaY);
        if (rawDistance >= CONFIG.pointerRadius) return;

        const distance = Math.max(rawDistance, 0.0001);
        const fallbackX = rawDistance === 0 ? 1 : deltaX / distance;
        const fallbackY = rawDistance === 0 ? 0 : deltaY / distance;
        const strength =
          (1 - distance / CONFIG.pointerRadius) * CONFIG.pointerForce;

        letter.x += fallbackX * strength;
        letter.y += fallbackY * strength;
      }

      function satisfyConstraint(constraint) {
        const deltaX = constraint.second.x - constraint.first.x;
        const deltaY = constraint.second.y - constraint.first.y;
        const distance = Math.max(Math.hypot(deltaX, deltaY), 0.0001);
        const correction = (constraint.restLength - distance) / distance;
        const offsetX = deltaX * correction;
        const offsetY = deltaY * correction;

        if (constraint.first.pinned) {
          constraint.second.x += offsetX;
          constraint.second.y += offsetY;
          return;
        }

        constraint.first.x -= offsetX * 0.5;
        constraint.first.y -= offsetY * 0.5;
        constraint.second.x += offsetX * 0.5;
        constraint.second.y += offsetY * 0.5;
      }

      function keepInsideViewport(letter) {
        const margin = fontSize * 0.5;
        letter.x = Math.max(margin, Math.min(viewportWidth - margin, letter.x));
        letter.y = Math.max(margin, Math.min(viewportHeight - margin, letter.y));
      }

      function updatePhysics() {
        letters.forEach(integrate);
        letters.forEach(applyPointerForce);

        for (let pass = 0; pass < CONFIG.constraintIterations; pass += 1) {
          constraints.forEach(satisfyConstraint);
        }

        letters.forEach(keepInsideViewport);
      }

      function render() {
        context.fillStyle = CONFIG.background;
        context.fillRect(0, 0, viewportWidth, viewportHeight);
        context.fillStyle = CONFIG.foreground;
        context.font = `300 ${fontSize}px ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace`;
        context.textAlign = "center";
        context.textBaseline = "middle";

        letters.forEach((letter) => {
          context.fillText(letter.character, letter.x, letter.y);
        });
      }

      function animate() {
        updatePhysics();
        render();
        window.requestAnimationFrame(animate);
      }

      function updatePointer(event) {
        const bounds = canvas.getBoundingClientRect();
        pointer.x = event.clientX - bounds.left;
        pointer.y = event.clientY - bounds.top;
        pointer.type = event.pointerType;
        pointer.active = event.pointerType === "mouse" || event.buttons > 0;

        window.clearTimeout(pointerIdleTimer);
        if (event.pointerType === "mouse") {
          pointerIdleTimer = window.setTimeout(() => {
            pointer.active = false;
          }, CONFIG.pointerIdleMs);
        }
      }

      canvas.addEventListener("pointermove", updatePointer);
      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture(event.pointerId);
        updatePointer(event);
        pointer.active = true;
      });
      canvas.addEventListener("pointerup", (event) => {
        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
        pointer.active = false;
      });
      canvas.addEventListener("pointercancel", () => {
        pointer.active = false;
      });
      canvas.addEventListener("pointerleave", (event) => {
        if (event.pointerType === "mouse") pointer.active = false;
      });

      window.addEventListener("resize", () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(resizeCanvas, CONFIG.resizeDebounceMs);
      });

      resizeCanvas();
      if (!reducedMotion) animate();
    </script>
  </body>
</html>
